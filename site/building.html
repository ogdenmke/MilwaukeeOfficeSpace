<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Building Details — Ogden &amp; Company</title>
  <meta name="description" content="Commercial office space available for lease. Managed by Ogden &amp; Company — Real Estate without Boundary.">
  <link rel="icon" href="images/logos/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="building">

  <!-- Loading splash -->
  <div class="loading-splash" id="loading-splash">
    <img src="images/logos/ogden-logo-white.svg" alt="Ogden &amp; Company">
    <div class="loading-splash-spinner"></div>
  </div>

  <!-- Header -->
  <header class="site-header">
    <button class="hamburger" id="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <a class="header-logo" href="index.html">
      <img src="images/logos/ogden-logo-white.svg" alt="Ogden &amp; Company">
    </a>
    <nav class="header-nav" id="header-nav">
      <a href="find-space.html">Find Your Space</a>
      <a href="index.html#suite-search-section">Browse All Suites</a>
      <a href="#inquiry-section">Contact</a>
    </nav>
  </header>

  <!-- Sidebar overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-title">Buildings</div>
    <nav class="sidebar-nav" id="sidebar-nav">
      <!-- Populated by JS -->
    </nav>
  </aside>

  <!-- Main -->
  <main class="main-content">
    <div class="building-header" id="building-header">
      <!-- Populated by JS -->
    </div>

    <section class="suites-section">
      <h2 id="suites-heading">Available Suites</h2>
      <div class="suites-grid" id="suites-list">
        <!-- Populated by JS -->
      </div>
    </section>

    <div class="building-cta" id="building-cta">
      <!-- Populated by JS -->
    </div>

    <section class="inquiry-section" id="inquiry-section">
      <h2>Interested in This Space?</h2>
      <p class="inquiry-subtitle">Fill out the form below and a broker will be in touch.</p>
      <form class="inquiry-form" id="inquiry-form">
        <input type="text" name="name" placeholder="Full Name" required>
        <input type="text" name="company" placeholder="Company Name" required>
        <input type="email" name="email" placeholder="Email Address" required>
        <input type="tel" name="phone" placeholder="Phone Number">
        <textarea name="message" rows="3" placeholder="Tell us about your space needs (size, timeline, etc.)"></textarea>
        <input type="hidden" name="building" id="inquiry-building" value="">
        <button type="submit" class="inquiry-submit">Submit Inquiry</button>
      </form>
      <div class="inquiry-success" id="inquiry-success" style="display:none">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        <p>Thank you! A broker will contact you shortly.</p>
      </div>
    </section>

    <footer class="site-footer">
      &copy; Ogden &amp; Company, Inc. &middot; Real Estate without Boundary&reg;
    </footer>
  </main>

  <!-- Back to top -->
  <button class="back-to-top" id="back-to-top" aria-label="Back to top">&uarr;</button>

  <!-- Document viewer modal -->
  <div class="doc-modal-overlay" id="doc-modal-overlay">
    <div class="doc-modal">
      <button class="doc-modal-close" id="doc-modal-close">&times;</button>
      <iframe id="doc-modal-iframe" src="about:blank"></iframe>
      <a class="doc-modal-fallback" id="doc-modal-fallback" href="#" target="_blank" style="display:none">Having trouble? Open in new tab &rarr;</a>
    </div>
  </div>

  <!-- Google Analytics — replace G-7SJYYVJB87 with your Measurement ID -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-7SJYYVJB87"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-7SJYYVJB87');
  </script>

  <script src="js/app.js"></script>
</body>
</html>
